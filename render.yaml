services:
  - type: web
    name: ttblabel-poc-app
    runtime: node
    buildCommand: >
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      NODE_ENV=production BASE_PATH=/ pnpm --filter @workspace/ttb-label-review run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      # Render auto-assigns PORT — do not set it manually.
      - key: SESSION_SECRET
        generateValue: true      # Render generates a random secret on first deploy
      - key: ANTHROPIC_API_KEY
        sync: false              # You will enter this in the Render dashboard
